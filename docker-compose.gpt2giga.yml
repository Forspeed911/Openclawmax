# OpenClawMax — Docker Compose (gpt2giga вариант)
# GigaChat через gpt2giga proxy от Сбера + Max Channel
#
# Использование:
#   cp .env.example .env
#   # заполнить .env
#   docker compose -f docker-compose.gpt2giga.yml up -d

services:
  # --- gpt2giga: OpenAI API → GigaChat API proxy ---
  gpt2giga:
    image: python:3.11-slim
    container_name: openclawmax-gpt2giga
    restart: unless-stopped
    command: >
      sh -c "pip install --no-cache-dir gpt2giga && gpt2giga
      --proxy.port 8090
      --proxy.host 0.0.0.0
      --gigachat.model ${GIGACHAT_MODEL:-GigaChat-Max}
      --proxy.pass-model true"
    environment:
      - GIGACHAT_CREDENTIALS=${GIGACHAT_AUTH_KEY}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - openclawmax

  # --- OpenClaw (видит gpt2giga как OpenAI API) ---
  openclaw:
    build:
      context: ./openclaw-src
      args:
        OPENCLAW_EXTENSIONS: "max"
    image: openclawmax:latest
    container_name: openclawmax
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-3000}:18789"
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--config", "/app/config.json"]
    environment:
      # GigaChat через gpt2giga (OpenClaw думает что это OpenAI)
      - OPENAI_API_BASE=http://gpt2giga:8090/v1
      - OPENAI_API_KEY=gpt2giga-local
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      # --- Max Messenger ---
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      # --- Опционально: Telegram ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # --- Webhook ---
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-}
      # --- Данные ---
      - DATA_DIR=/data
    volumes:
      - openclaw-data:/data
      - ./extensions/max:/app/extensions/max:ro
      - ./config/openclaw.gpt2giga.config.json:/app/config.json:ro
    depends_on:
      gpt2giga:
        condition: service_healthy
    networks:
      - openclawmax

  # --- Reverse proxy ---
  caddy:
    image: caddy:2-alpine
    container_name: openclawmax-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - openclawmax
    depends_on:
      - openclaw

volumes:
  openclaw-data:
  caddy-data:
  caddy-config:

networks:
  openclawmax:
    driver: bridge
