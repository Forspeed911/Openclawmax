# OpenClawMax — Docker Compose
# Вариант: gpt2giga прокси + Max Channel
#
# Использование:
#   cp .env.example .env
#   # заполнить .env
#   docker compose up -d

services:
  # --- gpt2giga: OpenAI → GigaChat proxy (OAuth внутри) ---
  gpt2giga:
    image: python:3.12-slim
    container_name: openclawmax-gpt2giga
    restart: unless-stopped
    command: >
      sh -c "pip install --quiet gpt2giga &&
             gpt2giga
               --gigachat.credentials $GIGACHAT_CREDS
               --gigachat.scope ${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
               --gigachat.verify-ssl-certs false
               --proxy.port 8443
               --proxy.pass-model true"
    environment:
      - GIGACHAT_CREDS=${GIGACHAT_AUTH_KEY}
      - GIGACHAT_SCOPE=${GIGACHAT_SCOPE:-GIGACHAT_API_PERS}
    networks:
      - openclawmax

  # --- OpenClaw gateway ---
  openclaw:
    build:
      context: ./openclaw-src
      args:
        OPENCLAW_EXTENSIONS: "max"
    image: openclawmax:latest
    container_name: openclawmax
    restart: unless-stopped
    ports:
      - "${OPENCLAW_PORT:-3000}:18789"
    command: >
      sh -c "cp /app/config-source/openclaw.config.json /tmp/config.json &&
             exec node openclaw.mjs gateway --allow-unconfigured --bind lan"
    environment:
      - OPENCLAW_CONFIG_PATH=/tmp/config.json
      # --- Max Messenger ---
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      # --- Опционально: Telegram ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      # --- Webhook ---
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL:-}
      # --- Данные ---
      - DATA_DIR=/data
    volumes:
      - openclaw-data:/data
      - ./config:/app/config-source:ro
    depends_on:
      - gpt2giga
    networks:
      - openclawmax

  # --- Reverse proxy (SSL + routing) ---
  caddy:
    image: caddy:2-alpine
    container_name: openclawmax-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - openclawmax
    depends_on:
      - openclaw

volumes:
  openclaw-data:
  caddy-data:
  caddy-config:

networks:
  openclawmax:
    driver: bridge
